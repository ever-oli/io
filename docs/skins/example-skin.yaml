# ============================================================================
# IO Φ Example Skin Template
# ============================================================================
#
# Copy this file to ~/.io/skins/<name>.yaml to create a custom skin.
# All fields are optional Φ missing values inherit from the default skin.
# Activate with: /skin <name>  or  display.skin: <name> in config.yaml
#
# See io_cli/skin_engine.py for the full schema reference.
# ============================================================================

# Required: unique skin name (used in /skin command and config)
name: example
description: An example custom skin Φ copy and modify this template

# ΦΦ Colors ΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦ
# Hex color values for Rich markup. These control the CLI's visual palette.
colors:
  # Banner panel (the startup welcome box)
  banner_border: "#CD7F32"        # Panel border
  banner_title: "#FFD700"         # Panel title text
  banner_accent: "#FFBF00"        # Section headers (Available Tools, Skills, etc.)
  banner_dim: "#B8860B"           # Dim/muted text (separators, model info)
  banner_text: "#FFF8DC"          # Body text (tool names, skill names)

  # UI elements
  ui_accent: "#FFBF00"            # General accent color
  ui_label: "#4dd0e1"             # Labels
  ui_ok: "#4caf50"                # Success indicators
  ui_error: "#ef5350"             # Error indicators
  ui_warn: "#ffa726"              # Warning indicators

  # Input area
  prompt: "#FFF8DC"               # Prompt text color
  input_rule: "#CD7F32"           # Horizontal rule around input

  # Response box
  response_border: "#FFD700"      # Response box border (ANSI color)

  # Session display
  session_label: "#DAA520"        # Session label
  session_border: "#8B8682"       # Session ID dim color

# ΦΦ Spinner ΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦ
# Customize the animated spinner shown during API calls and tool execution.
spinner:
  # Faces shown while waiting for the API response
  waiting_faces:
    - "(｡ΦΦΦΦΦ｡)"
    - "(ΦΦΦΦΦΦ)"
    - "٩(ΦΦΦΦΦ｡)۶"

  # Faces shown during extended thinking/reasoning
  thinking_faces:
    - "(｡Φ́︿Φ̀｡)"
    - "(Φ_Φ)"
    - "(¬Φ¬)"

  # Verbs used in spinner messages (e.g., "pondering your request...")
  thinking_verbs:
    - "pondering"
    - "contemplating"
    - "musing"
    - "ruminating"

  # Optional: left/right decorations around the spinner
  # Each entry is a [left, right] pair. Omit entirely for no wings.
  # wings:
  #   - ["ΦΦΦ", "ΦΦΦ"]
  #   - ["ΦΦ", "ΦΦ"]

# ΦΦ Branding ΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦ
# Text strings used throughout the CLI interface.
branding:
  agent_name: "IO"          # Banner title, about display
  welcome: "Welcome! Type your message or /help for commands."
  goodbye: "Goodbye! ΦΦΦ"              # Exit message
  response_label: " ΦΦΦ IO "       # Response box header label
  prompt_symbol: "Φ "                 # Input prompt symbol
  help_header: "(^_^)? Available Commands"  # /help header text

# ΦΦ Tool Output ΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦΦ
# Character used as the prefix for tool output lines.
# Default is "Φ" (thin dotted vertical line). Some alternatives:
#   "ΦΦ" (light triple dash vertical)
#   "Φ" (left one-eighth block)
#   "Φ" (box drawing light vertical)
#   "Φ" (box drawing heavy vertical)
tool_prefix: "Φ"
