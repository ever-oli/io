[project]
name = "io-bot"
version = "0.1.0"
description = "Telegram bot for IO - Morning briefings and notifications"
requires-python = ">=3.11"
dependencies = [
  "requests>=2.32.0",
  "python-dotenv>=1.0.1",
]

[build-system]
requires = ["hatchling>=1.27.0"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/io_bot"]
