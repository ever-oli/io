[project]
name = "io-agent-core"
version = "0.1.2"
description = "Core agent runtime for IO"
requires-python = ">=3.11"
dependencies = [
  "io-ai",
  "pydantic>=2.10.6",
]

[build-system]
requires = ["hatchling>=1.27.0"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/io_agent"]

