[project]
name = "io-coding-agent"
version = "0.1.0"
description = "Main IO coding agent CLI"
requires-python = ">=3.11"
dependencies = [
  "io-ai",
  "io-agent-core",
  "io-tui",
  "prompt_toolkit>=3.0.50",
  "python-dotenv>=1.0.1",
  "pyyaml>=6.0.2",
  "rich>=13.9.4",
]

[project.scripts]
io = "io_cli.cli:main"

[build-system]
requires = ["hatchling>=1.27.0"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/io_cli"]

