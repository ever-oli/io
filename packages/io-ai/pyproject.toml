[project]
name = "io-ai"
version = "0.1.2"
description = "Unified LLM provider runtime for IO"
requires-python = ">=3.11"
dependencies = [
  "httpx>=0.28.1",
  "pydantic>=2.10.6",
  "python-dotenv>=1.0.1",
]

[build-system]
requires = ["hatchling>=1.27.0"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/io_ai"]

