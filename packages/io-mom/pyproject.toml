[project]
name = "io-mom"
version = "0.1.0"
description = "Slack bot and workspace runtime for IO"
requires-python = ">=3.11"
dependencies = [
  "io-ai",
  "io-agent-core",
  "io-coding-agent",
]

[project.scripts]
mom = "io_mom.main:main"

[build-system]
requires = ["hatchling>=1.27.0"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/io_mom"]
