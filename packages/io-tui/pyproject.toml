[project]
name = "io-tui"
version = "0.1.2"
description = "Generic terminal UI building blocks for IO"
requires-python = ">=3.11"
dependencies = [
  "prompt_toolkit>=3.0.50",
  "rich>=13.9.4",
]

[build-system]
requires = ["hatchling>=1.27.0"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/io_tui"]

