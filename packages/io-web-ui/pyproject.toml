[project]
name = "io-web-ui"
version = "0.1.0"
description = "Web UI scaffolding for IO"
requires-python = ">=3.11"
dependencies = [
  "fastapi>=0.115.12",
  "io-ai",
  "io-tui",
  "uvicorn>=0.34.0",
]

[build-system]
requires = ["hatchling>=1.27.0"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/io_web_ui"]

