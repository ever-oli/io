[project]
name = "io-swarm"
version = "0.1.0"
description = "Background agent swarm management for IO (like Gauss's swarm manager)"
requires-python = ">=3.11"
dependencies = [
  "rich>=13.0.0",
]

[build-system]
requires = ["hatchling>=1.27.0"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/io_swarm"]
